{% extends "dashboard/base.html" %}
{% block content %}

<h1 class="text-2xl font-bold mb-4 text-white">Receive Stock</h1>

<div class="bg-slate-800 rounded-2xl p-6 shadow-xl text-white">

    <!-- SCAN BUTTON -->
    <div class="flex gap-4 mb-6">
        <button onclick="startScanner()"
            class="bg-purple-600 hover:bg-purple-700 px-6 py-3 rounded-xl font-bold">
            SCAN STOCK
        </button>
    </div>

    <!-- STOCK FORM -->
    <div class="grid md:grid-cols-4 gap-4 items-end">

        <!-- Hidden ID -->
        <input type="hidden" id="manualProductId">

        <div>
            <label class="text-sm">Product Name</label>
            <input id="manualProductName"
                class="w-full p-3 rounded-xl bg-slate-700 text-white">
        </div>

      <!-- CURRENT STOCK (READ ONLY) -->
<div>
    <label class="text-sm">Available Stock</label>
    <input id="availableStock" type="number" readonly
        class="w-full p-3 rounded-xl bg-slate-600 text-white">
</div>

<!-- ADD STOCK -->
<div>
    <label class="text-sm">Add Quantity</label>
    <input id="manualQty" type="number" value="1"
        class="w-full p-3 rounded-xl bg-slate-700 text-white">
</div>

        <div>
            <label class="text-sm">MRP</label>
            <input id="manualMrp" type="number" step="0.01"
                class="w-full p-3 rounded-xl bg-slate-700 text-white">
        </div>

        <div>
            <button onclick="manualStockAdd()"
                class="w-full bg-green-600 hover:bg-green-700 px-4 py-3 rounded-xl font-bold">
                ADD STOCK
            </button>
        </div>

    </div>
</div>

<!-- SCANNER MODAL -->
<div id="scannerModal"
    class="fixed inset-0 bg-black hidden z-[9999] flex flex-col">

    <div class="flex justify-between items-center p-4 text-white">
        <h2 class="font-bold text-lg">Scan Product</h2>
        <button onclick="closeScanner()"
            class="bg-red-500 px-4 py-2 rounded-xl">
            Close
        </button>
    </div>

    <div class="flex-1 flex items-center justify-center">
        <div id="reader" class="w-full max-w-md"></div>
    </div>
</div>

<script src="https://unpkg.com/html5-qrcode"></script>

<script>
let html5QrCode;

// ===== SCANNER =====
function startScanner(){
    document.getElementById("scannerModal").classList.remove("hidden");

    html5QrCode = new Html5Qrcode("reader");

    html5QrCode.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: 250 },
        (decodedText) => {
            html5QrCode.stop();
            closeScanner();
            handleScannedBarcode(decodedText);
        }
    );
}

function closeScanner(){
    document.getElementById("scannerModal").classList.add("hidden");
}

// ===== BARCODE PROCESS =====
function handleScannedBarcode(barcode){

    let extracted = extractDataFromBarcode(barcode);

    fetch("/check-product-exists/", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": getCookie("csrftoken")
        },
        body: JSON.stringify({
            code: extracted.productCode
        })
    })
    .then(res => res.json())
    .then(data => {

        // Always fill MRP from barcode
        document.getElementById("manualMrp").value = extracted.mrp;

   if(data.exists){

    document.getElementById("manualProductName").value = data.name;
    document.getElementById("manualProductId").value = data.id;

    // 🔥 Show existing stock
    document.getElementById("availableStock").value = data.stock;

} else {

    document.getElementById("manualProductName").value = extracted.productCode;
    document.getElementById("manualProductId").value = "";

    document.getElementById("availableStock").value = 0;
}

        document.getElementById("manualQty").focus();
    });
}

// ===== EXTRACT DATA =====
function extractDataFromBarcode(barcode){
    let parts = barcode.split("/");

    return {
        productCode: parts[3]?.trim(),
        mrp: parseFloat(parts[5])
    };
}

// ===== ADD STOCK BUTTON =====
function manualStockAdd(){

    let productId = document.getElementById("manualProductId").value;
    let name = document.getElementById("manualProductName").value.trim();
    let qty = parseInt(document.getElementById("manualQty").value);
    let mrp = parseFloat(document.getElementById("manualMrp").value);

    if(!name){
        alert("Product name required");
        return;
    }

    if(!qty || qty <= 0){
        alert("Enter valid quantity");
        return;
    }

    if(!mrp || mrp <= 0){
        alert("Enter valid MRP");
        return;
    }

    // ================= EXISTING PRODUCT =================
    if(productId && productId !== ""){

        fetch("/update-stock/", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "X-CSRFToken": getCookie("csrftoken")
            },
            body: JSON.stringify({
                product_id: productId,
                qty: qty,
                mrp: mrp
            })
        })
        .then(res => res.json())
        .then(data => {
            alert("Stock Updated Successfully!");
            location.reload();
        })
        .catch(error => {
            console.error(error);
            alert("Update failed");
        });

    } 

    // ================= NEW PRODUCT =================
    else {

        fetch("/create-product-stock/", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "X-CSRFToken": getCookie("csrftoken")
            },
            body: JSON.stringify({
                barcode: name,
                name: name,
                qty: qty,
                mrp: mrp
            })
        })
        .then(res => res.json())
        .then(data => {

            if(data.status === "created"){
                alert("New Product Added Successfully!");
                location.reload();
            } else {
                alert("Product creation failed");
            }

        })
        .catch(error => {
            console.error(error);
            alert("Error creating product");
        });
    }
}

// ===== CSRF =====
function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.substring(0, name.length + 1) === (name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}
</script>

{% endblock %}
