<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AutoBilling Login</title>

<script src="https://cdn.tailwindcss.com"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<style>
    @keyframes pulseFront {
    0%   { transform: scale(1); z-index: 2; }
    50%  { transform: scale(1.15); z-index: 3; }
    100% { transform: scale(1); z-index: 2; }
}

@keyframes pulseBack {
    0%   { transform: scale(1); opacity: 0.6; }
    50%  { transform: scale(0.9); opacity: 0.3; }
    100% { transform: scale(1); opacity: 0.6; }
}

.pulse-front {
    animation: pulseFront 0.9s infinite;
     animation-delay: 0s;
    filter: drop-shadow(0 0 15px rgba(255,215,0,0.7));
}

.pulse-back {
    animation: pulseBack 0.9s infinite;
    animation-delay: 0.2s;
}
#fullLoader {
    animation: fadeIn 0.3s ease;
}
@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}
@keyframes slideIn {
    from { transform: translateX(100%); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
}
.animate-slideIn {
    animation: slideIn 0.4s ease;
}
</style>
<body class="bg-gradient-to-br from-slate-900 via-slate-800 to-black min-h-screen flex items-center justify-center px-4">

<!-- MAIN CARD -->
<div class="relative bg-gradient-to-br from-slate-800 to-slate-900 
p-6 md:p-10 rounded-3xl w-full max-w-md text-white

shadow-[inset_-3px_-3px_6px_rgba(255,255,255,0.05),_10px_10px_30px_rgba(0,0,0,0.8)]
backdrop-blur-md border border-white/10">

    <!-- SHINE EFFECT -->
    <div class="absolute inset-0 rounded-3xl bg-gradient-to-tr from-white/10 to-transparent pointer-events-none"></div>

    <!-- LOGO -->
    <div class="flex justify-center mb-5 relative z-10">
        <img src="/static/icon-192.png" 
             alt="Logo" 
             class="w-16 h-16 md:w-20 md:h-20 rounded-xl

             shadow-[inset_2px_2px_6px_rgba(255,255,255,0.3),_6px_6px_18px_rgba(0,0,0,0.6)]">
    </div>

    <!-- TITLE -->
    <h2 class="text-xl md:text-3xl font-bold mb-6 text-center tracking-wide relative z-10">
        Maharashtra Automobiles
    </h2>
{% if messages %}
<div class="space-y-2">
    {% for message in messages %}
    
    <div class="flex items-center gap-2 p-3 rounded-xl
    bg-red-500/10 border border-red-400 text-red-400

    shadow-[0_0_10px_rgba(255,0,0,0.3)]
    animate-pulse">

        <i class="fa-solid fa-circle-exclamation"></i>
        <span>{{ message }}</span>

    </div>

    {% endfor %}
</div>
{% endif %}
    <form method="POST" class="space-y-4 relative z-10" onsubmit="showLoader()">
    {% csrf_token %}

    <!-- ROLE -->
    <select name="role"
    class="w-full p-3 rounded-xl bg-slate-800 text-white outline-none

    shadow-[inset_2px_2px_6px_rgba(255,255,255,0.1),_4px_4px_10px_rgba(0,0,0,0.7)]
    focus:shadow-[inset_2px_2px_6px_rgba(34,197,94,0.4),_0_0_10px_rgba(34,197,94,0.3)]
    transition">
        <option value="manager">Manager</option>
        <option value="admin">Admin</option>
    </select>

    <!-- USERNAME -->
    <input name="username"
    class="w-full p-3 rounded-xl bg-slate-800 outline-none

    shadow-[inset_2px_2px_6px_rgba(255,255,255,0.1),_4px_4px_10px_rgba(0,0,0,0.7)]
    focus:shadow-[inset_2px_2px_6px_rgba(34,197,94,0.4),_0_0_10px_rgba(34,197,94,0.3)]
    transition"
    placeholder="Username">

    <!-- PASSWORD WITH TOGGLE -->
    <div class="relative">
        <input type="password" id="password" name="password"
        class="w-full p-3 rounded-xl bg-slate-800 outline-none pr-10

        shadow-[inset_2px_2px_6px_rgba(255,255,255,0.1),_4px_4px_10px_rgba(0,0,0,0.7)]
        focus:shadow-[inset_2px_2px_6px_rgba(34,197,94,0.4),_0_0_10px_rgba(34,197,94,0.3)]
        transition"
        placeholder="Password">

        <!-- EYE ICON -->
        <i onclick="togglePassword()"
        class="fa-solid fa-eye absolute right-3 top-1/2 -translate-y-1/2 cursor-pointer opacity-70 hover:opacity-100 transition"></i>
    </div>

    <!-- LOGIN BUTTON -->
    <button id="loginBtn"
    class="w-full relative overflow-hidden
    bg-gradient-to-br from-yellow-300 via-yellow-400 to-amber-600
    text-black font-bold tracking-wide

    shadow-[inset_3px_3px_10px_rgba(255,255,255,0.6),_8px_8px_22px_rgba(0,0,0,0.4)]
    active:scale-95 active:shadow-[inset_3px_3px_8px_rgba(0,0,0,0.6)]

    p-3 rounded-2xl text-lg md:text-xl transition-all duration-200

    before:absolute before:inset-0 before:bg-gradient-to-tr before:from-white/40 before:to-transparent before:opacity-70
    ">

        <!-- TEXT -->
        <span id="btnText" class="relative z-10 flex items-center justify-center gap-2">
            🔐 LOGIN
        </span>
    </button>

</form>

    <!-- FOOTER -->
    <p class="text-center text-xs md:text-sm mt-6 opacity-60 relative z-10">
        Powered by MH Auto Billing
    </p>

</div>
<div id="fullLoader"
class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/70 backdrop-blur-md">

    <div class="relative w-24 h-24">

        <!-- BACK LAYER -->
        <img src="/static/icon-192.png"
        class="absolute inset-0 w-full h-full pulse-back">

        <!-- FRONT LAYER -->
        <img src="/static/icon-192.png"
        class="absolute inset-0 w-full h-full pulse-front">

    </div>

</div>
<script>
function togglePassword() {
    const pass = document.getElementById("password");
    pass.type = pass.type === "password" ? "text" : "password";
}

function showLoader() {
    document.getElementById("btnText").style.opacity = "0";

    // FULL SCREEN LOADER SHOW
    document.getElementById("fullLoader").classList.remove("hidden");
}

</script>
</body>
</html>
