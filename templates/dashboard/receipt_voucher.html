{% extends "base.html" %}
{% block content %}

<div class="max-w-4xl mx-auto px-3 md:px-6">

    <h1 class="text-xl md:text-2xl font-bold mb-6 text-white">
        Balance Received
    </h1>

    <div class="bg-slate-800 p-4 md:p-6 rounded-2xl shadow-xl">

        <form method="POST" class="space-y-4">

            {% csrf_token %}

            <div>
                <label class="text-gray-300 text-sm md:text-base">
                    Customer
                </label>

                <select name="customer_id"
                    class="w-full mt-1 p-3 rounded-xl bg-slate-700 text-white focus:ring-2 focus:ring-green-400">

                    {% for c in customers %}
                    <option value="{{ c.id }}">
                        {{ c.name }} (₹{{ c.balance }})
                    </option>
                    {% endfor %}

                </select>
            </div>

            <div>
                <label class="text-gray-300 text-sm md:text-base">
                    Amount Received
                </label>

                <input name="amount" placeholder="Enter amount"
                    class="w-full mt-1 p-3 rounded-xl bg-slate-700 text-white focus:ring-2 focus:ring-green-400">
            </div>

            <button class="w-full bg-green-500 hover:bg-green-600 p-3 rounded-xl font-bold text-lg transition">

                SAVE RECEIPT

            </button>

        </form>

    </div>

</div>

{% endblock %}
