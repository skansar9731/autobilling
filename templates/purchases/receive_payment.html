{% extends "base.html" %}
{% block content %}
<form method="POST" class="p-4">
  {% csrf_token %}

  <h2 class="text-xl text-white mb-4">
    Receive from {{ supplier.name }}
  </h2>

  <input type="number" step="0.01" name="amount"
    class="w-full p-3 rounded-lg bg-slate-800 text-white mb-4"
    placeholder="Enter amount">

  <button class="bg-green-500 px-4 py-2 rounded-lg text-white">
    Save
  </button>
</form>
{% endblock %}
